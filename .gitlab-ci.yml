default:
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  before_script:
    - apk add --no-cache make bash python3
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

stages:
  - build
  - release
  - deploy

variables:
  # Use TLS https://docs.gitlab.com/ee/ci/docker/using_docker_build.html#tls-enabled
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"

build-backend:
  stage: build
  script:
    - ls -la
    - cd backend
    - make build-image
    - docker push registry.gitlab.com/{{ github_organization }}/{{ project_slug }}/backend:latest

build-frontend:
  stage: build
  script:
    - ls -la
    - cd frontend
    - make build-image
    - docker push registry.gitlab.com/{{ github_organization }}/{{ project_slug }}/frontend:latest

release-image-backend:
  stage: release
  script:
    - docker pull registry.gitlab.com/{{ github_organization }}/{{ project_slug }}/backend:latest
    - docker tag {{ project_slug }}-backend $CONTAINER_RELEASE_IMAGE
    - docker push registry.gitlab.com/{{ github_organization }}/{{ project_slug }}/backend:latest
  only:
    - main

release-image-frontend:
  stage: release
  script:
    - docker registry.gitlab.com/{{ github_organization }}/{{ project_slug }}/frontend:latest
    - docker tag {{ project_slug }}-frontend $CONTAINER_RELEASE_IMAGE
    - docker push registry.gitlab.com/{{ github_organization }}/{{ project_slug }}/frontend:latest
  only:
    - main

deploy:
  stage: deploy
  script:
    - cd
    - cd devops
    - make stack-deploy
  only:
    - main
  environment: production
# https://stackoverflow.com/questions/50637641/how-to-push-multiple-images-needed-for-docker-compose-to-gitlab-registry-in-gitl

